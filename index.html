<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat - 智能助手</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@2/dist/lottie-player.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .page { display: none; width:100%; }
        .page.active { display: flex; justify-content:center; align-items:center; min-height:calc(100vh - 40px); }

        .auth-container {
            width:100%;
            max-width: 1000px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
            display: flex;
            overflow: hidden;
            min-height: 560px;
        }

        .auth-left {
            flex: 1;
            background: linear-gradient(135deg, rgba(102,126,234,0.15), rgba(118,75,162,0.15));
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
        }

        .auth-left lottie-player {
            width: 320px;
            height: 320px;
        }

        .auth-left .tagline {
            text-align: center;
            margin-top: 10px;
        }

        .auth-left .tagline h2 {
            color: rgba(255,255,255,0.9);
            font-size: 22px;
            font-weight: 600;
        }

        .auth-left .tagline p {
            color: rgba(255,255,255,0.45);
            font-size: 14px;
            margin-top: 6px;
        }

        .auth-right {
            flex: 1;
            padding: 50px 48px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .auth-form-title {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }

        .auth-form-sub {
            color: rgba(255,255,255,0.45);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .auth-form-sub a {
            color: #a5b4fc;
            text-decoration: none;
            cursor: pointer;
        }

        .auth-form-sub a:hover { text-decoration: underline; }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .form-group .input-wrap {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.06);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            padding: 0 14px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .form-group .input-wrap:focus-within {
            border-color: rgba(102,126,234,0.5);
            box-shadow: 0 0 16px rgba(102,126,234,0.1);
        }

        .form-group .input-wrap i {
            color: rgba(255,255,255,0.3);
            font-size: 16px;
            margin-right: 10px;
        }

        .form-group .input-wrap input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            padding: 14px 0;
            font-size: 15px;
            color: rgba(255,255,255,0.9);
            font-family: inherit;
        }

        .form-group .input-wrap input::placeholder {
            color: rgba(255,255,255,0.25);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            margin-top: 6px;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(102,126,234,0.35);
        }

        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { opacity:0.5; cursor:not-allowed; transform:none; box-shadow:none; }

        .auth-error {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.25);
            color: #fca5a5;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .auth-error.show { display: block; }

        /* Chat page styles */
        .chat-container {
            width:100%;
            max-width: 860px;
            height: 90vh;
            max-height: 800px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 18px 24px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .chat-header .avatar {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
            flex-shrink: 0;
        }

        .chat-header .info h1 { font-size:16px; font-weight:600; color:#fff; }
        .chat-header .info p { font-size:12px; color:rgba(255,255,255,0.45); margin-top:1px; }

        .chat-header .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .chat-header .user-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
        }

        .chat-header .user-badge i {
            font-size: 16px;
            color: #667eea;
        }

        .btn-logout {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.6);
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            background: rgba(239,68,68,0.15);
            border-color: rgba(239,68,68,0.3);
            color: #fca5a5;
        }

        .messages-area {
            flex:1; overflow-y:auto; padding:20px 24px;
            display:flex; flex-direction:column; gap:18px; scroll-behavior:smooth;
        }

        .messages-area::-webkit-scrollbar { width:5px; }
        .messages-area::-webkit-scrollbar-track { background:transparent; }
        .messages-area::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.12); border-radius:3px; }

        .message { display:flex; gap:10px; max-width:88%; animation:fadeInUp 0.3s ease; }
        @keyframes fadeInUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .message.user { align-self:flex-end; flex-direction:row-reverse; }

        .message .msg-avatar { width:32px; height:32px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:14px; margin-top:4px; }
        .message.ai .msg-avatar { background:linear-gradient(135deg,#667eea,#764ba2); color:white; }
        .message.user .msg-avatar { background:linear-gradient(135deg,#f093fb,#f5576c); color:white; }

        .message .bubble { padding:12px 16px; border-radius:16px; font-size:14px; line-height:1.7; word-wrap:break-word; }
        .message.ai .bubble { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.92); border-bottom-left-radius:5px; border:1px solid rgba(255,255,255,0.06); }
        .message.user .bubble { background:linear-gradient(135deg,#667eea,#764ba2); color:white; border-bottom-right-radius:5px; }

        .message .bubble p { margin-bottom:6px; }
        .message .bubble p:last-child { margin-bottom:0; }
        .message .bubble pre { background:rgba(0,0,0,0.3)!important; border-radius:10px; padding:14px; margin:8px 0; overflow-x:auto; border:1px solid rgba(255,255,255,0.06); }
        .message .bubble pre code { font-family:'JetBrains Mono','Fira Code','Consolas',monospace; font-size:13px; line-height:1.6; background:none!important; padding:0!important; color:#e4e4e4; }
        .message .bubble code:not(pre code) { background:rgba(102,126,234,0.2); padding:2px 6px; border-radius:4px; font-size:13px; color:#a5b4fc; }
        .message .bubble ul, .message .bubble ol { padding-left:20px; margin:5px 0; }
        .message .bubble blockquote { border-left:3px solid rgba(102,126,234,0.5); padding-left:12px; color:rgba(255,255,255,0.5); margin:6px 0; }
        .message .bubble table { border-collapse:collapse; width:100%; margin:8px 0; font-size:13px; }
        .message .bubble th,.message .bubble td { border:1px solid rgba(255,255,255,0.12); padding:6px 10px; text-align:left; }
        .message .bubble th { background:rgba(255,255,255,0.04); font-weight:600; }
        .message .bubble a { color:#a5b4fc; text-decoration:none; }
        .message .bubble a:hover { text-decoration:underline; }
        .message .timestamp { font-size:10px; color:rgba(255,255,255,0.18); margin-top:4px; text-align:right; }

        .typing-indicator { display:flex; gap:10px; max-width:88%; animation:fadeInUp 0.3s ease; }
        .typing-indicator .msg-avatar { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,#667eea,#764ba2); display:flex; align-items:center; justify-content:center; font-size:14px; color:white; flex-shrink:0; margin-top:4px; }
        .typing-dots { background:rgba(255,255,255,0.08); padding:14px 22px; border-radius:16px; border-bottom-left-radius:5px; display:flex; gap:4px; align-items:center; border:1px solid rgba(255,255,255,0.06); }
        .typing-dots span { width:7px; height:7px; background:rgba(255,255,255,0.35); border-radius:50%; display:inline-block; animation:bounce 1.4s infinite ease-in-out both; }
        .typing-dots span:nth-child(1) { animation-delay:-0.32s; }
        .typing-dots span:nth-child(2) { animation-delay:-0.16s; }
        .typing-dots span:nth-child(3) { animation-delay:0s; }
        @keyframes bounce { 0%,80%,100% { transform:scale(0.6); } 40% { transform:scale(1); } }

        .input-area { padding:16px 24px; background:rgba(255,255,255,0.03); border-top:1px solid rgba(255,255,255,0.06); }
        .input-wrapper { display:flex; gap:8px; align-items:flex-end; background:rgba(255,255,255,0.06); border-radius:14px; padding:3px; border:1px solid rgba(255,255,255,0.08); transition:border-color 0.3s,box-shadow 0.3s; }
        .input-wrapper:focus-within { border-color:rgba(102,126,234,0.5); box-shadow:0 0 16px rgba(102,126,234,0.08); }
        .input-wrapper textarea { flex:1; background:transparent; border:none; outline:none; padding:10px 14px; font-size:14px; color:rgba(255,255,255,0.9); font-family:inherit; resize:none; max-height:100px; line-height:1.5; }
        .input-wrapper textarea::placeholder { color:rgba(255,255,255,0.25); }
        .input-wrapper .btn-send { width:40px; height:40px; border:none; background:linear-gradient(135deg,#667eea,#764ba2); border-radius:11px; color:white; font-size:16px; cursor:pointer; transition:all 0.25s; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin:3px; }
        .input-wrapper .btn-send:hover { transform:scale(1.05); box-shadow:0 4px 12px rgba(102,126,234,0.35); }
        .input-wrapper .btn-send:active { transform:scale(0.95); }
        .input-wrapper .btn-send:disabled { opacity:0.35; cursor:not-allowed; transform:none; box-shadow:none; }

        .empty-state { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:rgba(255,255,255,0.18); gap:12px; user-select:none; }
        .empty-state i { font-size:48px; }
        .empty-state h2 { font-size:20px; font-weight:500; color:rgba(255,255,255,0.25); }
        .empty-state p { font-size:13px; color:rgba(255,255,255,0.12); }

        .welcome-suggestions { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-top:20px; }
        .welcome-suggestions .chip { padding:7px 14px; border-radius:18px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); color:rgba(255,255,255,0.4); font-size:12px; cursor:pointer; transition:all 0.2s; }
        .welcome-suggestions .chip:hover { background:rgba(102,126,234,0.18); border-color:rgba(102,126,234,0.25); color:rgba(255,255,255,0.75); }

        @media (max-width: 768px) {
            .auth-container { flex-direction:column; max-width:440px; }
            .auth-left { padding:24px; min-height:auto; }
            .auth-left lottie-player { width:200px; height:200px; }
            .auth-left .tagline h2 { font-size:18px; }
            .auth-right { padding:32px 24px; }
            .chat-container { height:calc(100vh - 20px); max-height:none; border-radius:16px; }
            .messages-area { padding:14px; gap:12px; }
            .message { max-width:95%; }
            .input-area { padding:12px 14px; }
            .chat-header { padding:12px 14px; }
            body { padding:10px; }
        }
    </style>
</head>
<body>

<!-- ====== AUTH PAGE ====== -->
<div class="page active" id="authPage">
    <div class="auth-container">
        <div class="auth-left">
            <lottie-player
                src="https://assets2.lottiefiles.com/packages/lf20_givpconn.json"
                background="transparent"
                speed="1"
                loop
                autoplay
            ></lottie-player>
            <div class="tagline">
                <h2>AI 智能助手</h2>
                <p>基于 GLM-5.1 大模型 · 流畅对话体验</p>
            </div>
        </div>
        <div class="auth-right">
            <div id="loginForm">
                <h2 class="auth-form-title">欢迎回来</h2>
                <p class="auth-form-sub">还没有账号？<a onclick="showRegister()">立即注册</a></p>
                <div class="auth-error" id="loginError"></div>
                <div class="form-group">
                    <label>用户名 / 邮箱</label>
                    <div class="input-wrap">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" id="loginUser" placeholder="请输入用户名或邮箱" autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <div class="input-wrap">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="loginPass" placeholder="请输入密码" autocomplete="current-password">
                    </div>
                </div>
                <button class="btn-primary" id="loginBtn" onclick="handleLogin()">登 录</button>
            </div>

            <div id="registerForm" style="display:none;">
                <h2 class="auth-form-title">创建账号</h2>
                <p class="auth-form-sub">已有账号？<a onclick="showLogin()">去登录</a></p>
                <div class="auth-error" id="registerError"></div>
                <div class="form-group">
                    <label>用户名</label>
                    <div class="input-wrap">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" id="regUser" placeholder="请输入用户名" autocomplete="off">
                    </div>
                </div>
                <div class="form-group">
                    <label>邮箱</label>
                    <div class="input-wrap">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="regEmail" placeholder="请输入邮箱" autocomplete="email">
                    </div>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <div class="input-wrap">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="regPass" placeholder="请设置密码（至少6位）" autocomplete="new-password">
                    </div>
                </div>
                <button class="btn-primary" id="registerBtn" onclick="handleRegister()">注 册</button>
            </div>
        </div>
    </div>
</div>

<!-- ====== CHAT PAGE ====== -->
<div class="page" id="chatPage">
    <div class="chat-container">
        <div class="chat-header">
            <div class="avatar"><i class="fa-solid fa-robot"></i></div>
            <div class="info">
                <h1>AI 智能助手</h1>
                <p>GLM-5.1 · 多轮对话</p>
            </div>
            <div class="header-right">
                <div class="user-badge"><i class="fa-regular fa-circle-user"></i> <span id="userNameDisplay"></span></div>
                <button class="btn-logout" onclick="handleLogout()"><i class="fa-solid fa-right-from-bracket"></i> 退出</button>
            </div>
        </div>

        <div class="messages-area" id="messagesArea">
            <div class="empty-state" id="emptyState">
                <i class="fa-regular fa-comment-dots"></i>
                <h2>有什么可以帮你的？</h2>
                <p>输入问题开始对话</p>
                <div class="welcome-suggestions">
                    <span class="chip" onclick="sendSuggestion('用Python写一个快速排序算法')">排序算法</span>
                    <span class="chip" onclick="sendSuggestion('解释一下什么是机器学习')">机器学习</span>
                    <span class="chip" onclick="sendSuggestion('写一首关于秋天的诗')">写一首诗</span>
                    <span class="chip" onclick="sendSuggestion('如何提高代码质量？')">代码质量</span>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="chatInput" rows="1" placeholder="输入消息..." oninput="autoResize(this)" onkeydown="handleKeyDown(event)"></textarea>
                <button class="btn-send" id="sendBtn" onclick="sendMessage()"><i class="fa-solid fa-arrow-up"></i></button>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = '';
    let isStreaming = false;
    let token = localStorage.getItem('token');

    function showError(el, msg) {
        el.textContent = msg;
        el.classList.add('show');
    }

    function clearError(el) {
        el.textContent = '';
        el.classList.remove('show');
    }

    function showLogin() {
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('loginForm').style.display = 'block';
        clearError(document.getElementById('registerError'));
    }

    function showRegister() {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
        clearError(document.getElementById('loginError'));
    }

    function switchPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    async function handleLogin() {
        const username = document.getElementById('loginUser').value.trim();
        const password = document.getElementById('loginPass').value.trim();
        const errEl = document.getElementById('loginError');
        const btn = document.getElementById('loginBtn');
        clearError(errEl);
        if (!username || !password) { showError(errEl, '请填写完整信息'); return; }

        btn.disabled = true; btn.textContent = '登录中...';
        try {
            const resp = await fetch(`${API_BASE}/api/login`, {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({username, password})
            });
            const data = await resp.json();
            if (!resp.ok) { showError(errEl, data.detail || '登录失败'); return; }
            token = data.token;
            localStorage.setItem('token', token);
            document.getElementById('userNameDisplay').textContent = data.user.username;
            switchPage('chatPage');
            document.getElementById('chatInput').focus();
        } catch(e) {
            showError(errEl, '网络错误，请检查服务器连接');
        } finally {
            btn.disabled = false; btn.textContent = '登 录';
        }
    }

    async function handleRegister() {
        const username = document.getElementById('regUser').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPass').value.trim();
        const errEl = document.getElementById('registerError');
        const btn = document.getElementById('registerBtn');
        clearError(errEl);
        if (!username || !email || !password) { showError(errEl, '请填写完整信息'); return; }
        if (username.length < 2) { showError(errEl, '用户名至少2个字符'); return; }
        if (password.length < 6) { showError(errEl, '密码至少6位'); return; }

        btn.disabled = true; btn.textContent = '注册中...';
        try {
            const resp = await fetch(`${API_BASE}/api/register`, {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({username, email, password})
            });
            const data = await resp.json();
            if (!resp.ok) { showError(errEl, data.detail || '注册失败'); return; }
            token = data.token;
            localStorage.setItem('token', token);
            document.getElementById('userNameDisplay').textContent = data.user.username;
            switchPage('chatPage');
            document.getElementById('chatInput').focus();
        } catch(e) {
            showError(errEl, '网络错误，请检查服务器连接');
        } finally {
            btn.disabled = false; btn.textContent = '注 册';
        }
    }

    function handleLogout() {
        token = null;
        localStorage.removeItem('token');
        switchPage('authPage');
        document.getElementById('loginUser').value = '';
        document.getElementById('loginPass').value = '';
        clearError(document.getElementById('loginError'));
        clearError(document.getElementById('registerError'));
    }

    // Auto-login check
    (async function() {
        if (token) {
            try {
                const resp = await fetch(`${API_BASE}/api/user/me`, {
                    headers: {'Authorization': `Bearer ${token}`}
                });
                if (resp.ok) {
                    const user = await resp.json();
                    document.getElementById('userNameDisplay').textContent = user.username;
                    switchPage('chatPage');
                    document.getElementById('chatInput').focus();
                    return;
                }
            } catch(e) {}
            localStorage.removeItem('token');
        }
        switchPage('authPage');
    })();

    // Chat functionality
    function autoResize(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 100) + 'px';
    }

    function handleKeyDown(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }

    function scrollToBottom() {
        const area = document.getElementById('messagesArea');
        requestAnimationFrame(() => { area.scrollTop = area.scrollHeight; });
    }

    function formatTime() {
        return new Date().toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' });
    }

    function addMessage(role, content) {
        const area = document.getElementById('messagesArea');
        const emptyState = document.getElementById('emptyState');
        if (emptyState) emptyState.style.display = 'none';
        const div = document.createElement('div');
        div.className = `message ${role}`;
        const icon = role === 'ai' ? 'fa-robot' : 'fa-user';
        div.innerHTML = `<div class="msg-avatar"><i class="fa-solid ${icon}"></i></div><div class="bubble"><div class="content">${marked.parse(content)}</div><div class="timestamp">${formatTime()}</div></div>`;
        area.appendChild(div);
        div.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
        scrollToBottom();
        return div;
    }

    function showTyping() {
        const area = document.getElementById('messagesArea');
        const s = document.getElementById('emptyState');
        if (s) s.style.display = 'none';
        const div = document.createElement('div');
        div.className = 'typing-indicator'; div.id = 'typingIndicator';
        div.innerHTML = `<div class="msg-avatar"><i class="fa-solid fa-robot"></i></div><div class="typing-dots"><span></span><span></span><span></span></div>`;
        area.appendChild(div);
        scrollToBottom();
    }

    function removeTyping() { const el = document.getElementById('typingIndicator'); if (el) el.remove(); }

    function updateAIMessage(content) {
        let bubble = document.querySelector('.message.ai:last-child .bubble .content');
        if (!bubble) {
            const area = document.getElementById('messagesArea');
            const div = document.createElement('div');
            div.className = 'message ai';
            div.innerHTML = `<div class="msg-avatar"><i class="fa-solid fa-robot"></i></div><div class="bubble"><div class="content"></div><div class="timestamp">${formatTime()}</div></div>`;
            area.appendChild(div);
            bubble = div.querySelector('.content');
        }
        bubble.innerHTML = marked.parse(content);
        bubble.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
        scrollToBottom();
    }

    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text || isStreaming) return;
        input.value = ''; autoResize(input);
        addMessage('user', text);
        showTyping();
        isStreaming = true;
        document.getElementById('sendBtn').disabled = true;

        const history = [];
        document.querySelectorAll('.message .bubble .content').forEach(el => {
            const parent = el.closest('.message');
            if (parent) {
                history.push({ role: parent.classList.contains('user') ? 'user' : 'assistant', content: el.textContent });
            }
        });

        try {
            const resp = await fetch(`${API_BASE}/api/chat`, {
                method: 'POST',
                headers: { 'Content-Type':'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ messages: history, stream: true })
            });
            if (!resp.ok) {
                const err = await resp.json();
                if (resp.status === 401) { handleLogout(); return; }
                throw new Error(err.detail || `HTTP ${resp.status}`);
            }
            removeTyping();
            let fullContent = '';
            const reader = resp.body.getReader();
            const decoder = new TextDecoder();
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const chunk = decoder.decode(value, { stream: true });
                for (const line of chunk.split('\n')) {
                    if (line.startsWith('data: ')) {
                        const dataStr = line.slice(6).trim();
                        if (dataStr === '[DONE]') continue;
                        try {
                            const data = JSON.parse(dataStr);
                            if (data.error) { fullContent += `\n\n> 错误: ${data.error}`; }
                            else if (data.content) { fullContent += data.content; updateAIMessage(fullContent); }
                        } catch(e) {}
                    }
                }
            }
            if (!fullContent) updateAIMessage('未收到有效回复，请重试。');
        } catch(err) {
            removeTyping();
            updateAIMessage(`请求失败: ${err.message}`);
        } finally {
            isStreaming = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('chatInput').focus();
        }
    }

    function sendSuggestion(text) {
        document.getElementById('chatInput').value = text;
        sendMessage();
    }

    document.getElementById('chatInput').focus();
</script>
</body>
